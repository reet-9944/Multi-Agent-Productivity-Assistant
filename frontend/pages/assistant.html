<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AI Assistant — NEXUS</title>
<link rel="stylesheet" href="../assets/css/global.css">
<style>
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 50px);}
.chat-hd{padding:14px 24px;border-bottom:1px solid var(--b1);display:flex;align-items:center;gap:12px;flex-shrink:0;background:var(--bg);}
.chat-av{width:42px;height:42px;border-radius:var(--r);background:linear-gradient(135deg,var(--blue),var(--teal));display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.msgs{flex:1;overflow-y:auto;padding:18px 24px;display:flex;flex-direction:column;gap:12px;}
.msg{display:flex;gap:9px;max-width:760px;animation:fadeUp .3s ease;}
.msg.u{align-self:flex-end;flex-direction:row-reverse;}
.msg-av{width:32px;height:32px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:14px;}
.msg.u .msg-av{background:var(--blue);}
.msg.ai .msg-av{background:var(--bg3);border:1px solid var(--b1);}
.msg-body{display:flex;flex-direction:column;gap:3px;}
.msg-ag{font-family:var(--mono);font-size:.65rem;color:var(--teal-l);letter-spacing:.03em;}
.bubble{padding:10px 14px;border-radius:11px;font-size:.85rem;line-height:1.65;white-space:pre-wrap;word-break:break-word;}
.msg.u .bubble{background:rgba(77,124,254,.12);border:1px solid rgba(77,124,254,.2);border-radius:11px 4px 11px 11px;}
.msg.ai .bubble{background:var(--bg2);border:1px solid var(--b1);border-radius:4px 11px 11px 11px;}
.msg-t{font-family:var(--mono);font-size:.62rem;color:var(--t4);}
.msg.u .msg-t{text-align:right;}
.typing{display:flex;gap:4px;padding:2px 0;}
.typing span{width:5px;height:5px;border-radius:50%;background:var(--t3);animation:tb 1.4s infinite;}
.typing span:nth-child(2){animation-delay:.2s;}.typing span:nth-child(3){animation-delay:.4s;}
@keyframes tb{0%,60%,100%{transform:translateY(0);opacity:.4;}30%{transform:translateY(-5px);opacity:1;}}
.suggs{padding:7px 24px;border-top:1px solid var(--b1);display:flex;gap:6px;flex-wrap:wrap;background:var(--bg2);}
.sugg{background:var(--bg3);border:1px solid var(--b2);border-radius:100px;padding:4px 12px;font-size:.73rem;color:var(--t2);cursor:pointer;transition:var(--tr);font-family:var(--mono);white-space:nowrap;}
.sugg:hover{border-color:var(--blue);color:var(--blue-l);background:var(--blue-dim);}
.inp-area{padding:12px 24px;border-top:1px solid var(--b1);background:var(--bg2);display:flex;gap:9px;align-items:flex-end;flex-shrink:0;}
.inp-area textarea{flex:1;background:var(--bg3);border:1px solid var(--b2);border-radius:var(--r);padding:10px 13px;color:var(--t1);font-family:var(--font);font-size:.85rem;outline:none;resize:none;max-height:110px;min-height:42px;line-height:1.5;transition:var(--tr);}
.inp-area textarea:focus{border-color:var(--blue);}
.inp-area textarea::placeholder{color:var(--t3);}
.send{width:42px;height:42px;border-radius:var(--r);background:var(--blue);border:none;color:#fff;font-size:17px;cursor:pointer;flex-shrink:0;transition:var(--tr);display:flex;align-items:center;justify-content:center;}
.send:hover{background:#6b96ff;}
.send:disabled{opacity:.4;cursor:not-allowed;}
.ac={};
</style>
</head>
<body>
<div class="topbar" id="topbar"><span class="topbar-title">AI Assistant</span></div>
<div class="chat-wrap" id="cw">
  <div class="chat-hd">
    <div class="chat-av">◈</div>
    <div><div style="font-size:.9rem;font-weight:700;">NEXUS AI</div><div style="display:flex;align-items:center;gap:6px;font-size:.73rem;color:var(--t3);"><span class="dot-on"></span>6 agents · MongoDB connected</div></div>
    <button onclick="clearChat()" class="btn btn-ghost btn-sm" style="margin-left:auto;">Clear</button>
  </div>
  <div class="msgs" id="msgs"></div>
  <div class="suggs">
    <span style="font-size:.68rem;color:var(--t4);font-family:var(--mono);align-self:center;">Try:</span>
    <span class="sugg" onclick="fill('add task finish hackathon project')">add task</span>
    <span class="sugg" onclick="fill('hi')">hi</span>
    <span class="sugg" onclick="fill('what can you do')">capabilities</span>
    <span class="sugg" onclick="fill('show my tasks')">my tasks</span>
    <span class="sugg" onclick="fill('weather in Delhi')">weather</span>
    <span class="sugg" onclick="fill('tell me about pricing')">pricing</span>
    <span class="sugg" onclick="fill('remember MongoDB is a NoSQL database')">remember fact</span>
    <span class="sugg" onclick="fill('hackathon')">hackathon</span>
  </div>
  <div class="inp-area">
    <textarea id="inp" placeholder="Message NEXUS AI… (Enter to send, Shift+Enter for newline)" rows="1"></textarea>
    <button class="send" id="send-btn" onclick="sendMsg()">→</button>
  </div>
</div>
<script src="../assets/js/shared.js"></script><script src="../assets/js/appshell.js"></script>
<script>
if (!needAuth()) {}
else {
  buildAppShell('assistant');
  const am = document.querySelector('.app-main');
  am.innerHTML = '';
  am.appendChild(document.getElementById('topbar'));
  am.appendChild(document.getElementById('cw'));
  const agC={'Task Agent':'#4d7cfe','Notes Agent':'#30b0a0','Calendar Agent':'#7db58a','Knowledge Agent':'#d4a84b','Weather Agent':'#9b87f5','Router Agent':'#e06b6b','NEXUS AI':'#4d7cfe'};
  function addMsg(role, text, agent) {
    const m=document.getElementById('msgs');
    const d=document.createElement('div'); d.className=`msg ${role}`;
    const now=new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
    d.innerHTML=`<div class="msg-av">${role==='u'?'👤':'◈'}</div><div class="msg-body">${agent&&role==='ai'?`<span class="msg-ag" style="color:${agC[agent]||'var(--teal-l)'};">↳ ${agent}</span>`:''}<div class="bubble">${text}</div><span class="msg-t">${now}</span></div>`;
    m.appendChild(d); m.scrollTop=m.scrollHeight;
  }
  function showTyping() {
    const m=document.getElementById('msgs'); const d=document.createElement('div'); d.className='msg ai'; d.id='typing';
    d.innerHTML=`<div class="msg-av">◈</div><div class="msg-body"><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div></div>`;
    m.appendChild(d); m.scrollTop=m.scrollHeight;
  }
  addMsg('ai','Hello! 👋 I\'m NEXUS AI, your multi-agent productivity assistant.\n\nI can help you manage tasks, notes, events, and knowledge — and I respond to any question you have!\n\nType anything to get started.','NEXUS AI');
  async function sendMsg() {
    const inp=document.getElementById('inp'); const txt=inp.value.trim();
    if(!txt||document.getElementById('send-btn').disabled) return;
    inp.value=''; inp.style.height='42px'; addMsg('u',txt);
    document.getElementById('send-btn').disabled=true;
    showTyping();
    await new Promise(r=>setTimeout(r,500+Math.random()*600));
    document.getElementById('typing')?.remove();
    const r=await aiChat(txt);
    addMsg('ai',r.text,r.agent);
    document.getElementById('send-btn').disabled=false; inp.focus();
  }
  function fill(t){document.getElementById('inp').value=t;document.getElementById('inp').focus();}
  function clearChat(){document.getElementById('msgs').innerHTML='';addMsg('ai','Chat cleared. Ready for a fresh start! What can I help you with?','NEXUS AI');}
  const inp=document.getElementById('inp');
  inp.addEventListener('input',()=>{inp.style.height='42px';inp.style.height=Math.min(inp.scrollHeight,110)+'px';});
  inp.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg();}});
}
</script>
</body></html>
