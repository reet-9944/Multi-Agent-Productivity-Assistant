<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dashboard — NEXUS</title>
<link rel="stylesheet" href="../assets/css/global.css">
<style>
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:20px;}
.stat-c{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--rl);padding:18px 20px;position:relative;overflow:hidden;transition:var(--tr);}
.stat-c:hover{border-color:var(--b2);transform:translateY(-2px);}
.stat-c::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.stat-val{font-size:2rem;font-weight:800;font-family:var(--mono);line-height:1;}
.stat-lbl{font-size:.72rem;color:var(--t3);margin-top:4px;font-family:var(--mono);letter-spacing:.04em;text-transform:uppercase;}
.dash-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:14px;margin-bottom:14px;}
.panel{background:var(--bg2);border:1px solid var(--b1);border-radius:var(--rl);padding:18px;}
.panel-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.panel-t{font-size:.72rem;font-weight:600;color:var(--t3);font-family:var(--mono);letter-spacing:.05em;text-transform:uppercase;}
.panel-lnk{font-size:.72rem;color:var(--blue-l);text-decoration:none;font-family:var(--mono);}
.task-row{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--b1);}
.task-row:last-child{border-bottom:none;}
.chk{width:18px;height:18px;border-radius:5px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;}
.chk.done{background:var(--teal);color:#0a1a18;}
.chk.pend{border:1.5px solid var(--b2);}
.bars{display:flex;align-items:flex-end;gap:5px;height:44px;}
.bar{flex:1;border-radius:3px 3px 0 0;min-height:3px;transition:height .5s ease;}
.note-g{display:grid;grid-template-columns:1fr 1fr;gap:9px;}
.note-m{background:var(--bg3);border:1px solid var(--b1);border-radius:9px;padding:12px;position:relative;overflow:hidden;}
.note-m::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;}
.note-m h4{font-size:.8rem;margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.note-m p{font-size:.74rem;color:var(--t3);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.ev-row{display:flex;gap:11px;padding:9px 0;border-bottom:1px solid var(--b1);}
.ev-row:last-child{border-bottom:none;}
.ev-dt{width:40px;height:40px;border-radius:8px;border:1px solid var(--b2);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;}
.ev-d{font-size:.95rem;font-weight:800;font-family:var(--mono);color:var(--blue-l);line-height:1;}
.ev-m{font-size:.58rem;color:var(--t3);font-family:var(--mono);text-transform:uppercase;}
.qa{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
@media(max-width:1024px){.stat-grid{grid-template-columns:1fr 1fr;}.dash-grid{grid-template-columns:1fr;}.note-g{grid-template-columns:1fr;}}
@media(max-width:640px){.stat-grid{grid-template-columns:1fr 1fr;};}
</style>
</head>
<body>
<div class="topbar" id="topbar"><span class="topbar-title">Dashboard</span><div style="margin-left:auto;display:flex;align-items:center;gap:10px;"><span id="clk" style="font-family:var(--mono);font-size:.76rem;color:var(--t3);"></span></div></div>
<div class="page-content" id="pc">
  <div style="margin-bottom:22px;">
    <div style="font-family:var(--mono);font-size:.7rem;color:var(--t3);letter-spacing:.05em;margin-bottom:4px;" id="d-date"></div>
    <h1 style="font-size:1.5rem;margin-bottom:2px;" id="d-greet">Good morning</h1>
    <p style="font-size:.85rem;" id="d-sub">Here's what's happening in your workspace.</p>
  </div>
  <div class="stat-grid" id="stats">
    <div class="skel" style="height:90px;border-radius:14px;"></div><div class="skel" style="height:90px;border-radius:14px;"></div><div class="skel" style="height:90px;border-radius:14px;"></div><div class="skel" style="height:90px;border-radius:14px;"></div>
  </div>
  <div class="dash-grid">
    <div class="flex fcol gap14">
      <div class="panel"><div class="panel-hd"><span class="panel-t">Active tasks</span><a href="tasks.html" class="panel-lnk">All →</a></div><div id="tp"><div class="skel" style="height:150px;border-radius:8px;"></div></div></div>
      <div class="panel"><div class="panel-hd"><span class="panel-t">Recent notes</span><a href="notes.html" class="panel-lnk">All →</a></div><div id="np"><div class="skel" style="height:110px;border-radius:8px;"></div></div></div>
    </div>
    <div class="flex fcol gap14">
      <div class="panel"><div class="panel-hd"><span class="panel-t">7-day activity</span></div><div class="bars" id="chart"></div><div style="display:flex;justify-content:space-between;margin-top:4px;">${['M','T','W','T','F','S','S'].map(d=>`<span style="font-size:.62rem;color:var(--t4);font-family:var(--mono);">${d}</span>`).join('')}</div></div>
      <div class="panel"><div class="panel-hd"><span class="panel-t">Upcoming</span><a href="calendar.html" class="panel-lnk">All →</a></div><div id="ep"><div class="skel" style="height:100px;border-radius:8px;"></div></div></div>
      <div class="panel"><div class="panel-hd"><span class="panel-t">Quick actions</span></div><div class="qa"><a href="tasks.html" class="btn btn-ghost btn-sm">+ Task</a><a href="notes.html" class="btn btn-ghost btn-sm">+ Note</a><a href="calendar.html" class="btn btn-ghost btn-sm">+ Event</a><a href="assistant.html" class="btn btn-ghost btn-sm">◈ AI Chat</a><a href="knowledge.html" class="btn btn-ghost btn-sm">◉ Knowledge</a><a href="weather.html" class="btn btn-ghost btn-sm">◌ Weather</a></div></div>
    </div>
  </div>
</div>
<script src="../assets/js/shared.js"></script><script src="../assets/js/appshell.js"></script>
<script>
if (!needAuth()) {}
else {
  buildAppShell('dashboard');
  const am = document.querySelector('.app-main');
  am.prepend(document.getElementById('topbar')); am.appendChild(document.getElementById('pc'));
  const u = getUser();
  document.getElementById('d-greet').innerHTML = `${greeting()}, <span style="color:var(--blue-l);">${u?.name?.split(' ')[0]||'there'}</span> 👋`;
  document.getElementById('d-sub').textContent = "Here's what's happening in your workspace today.";
  document.getElementById('d-date').textContent = new Date().toLocaleDateString('en-GB',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  setInterval(()=>{ document.getElementById('clk').textContent = new Date().toLocaleTimeString(); }, 1000);

  async function load() {
    try {
      const [s,t,n,e] = await Promise.all([api('/stats').catch(()=>({data:{tasks:0,notes:0,events:0,knowledge:0,doneTasks:0,highPriority:0}})), api('/tasks').catch(()=>({data:[]})), api('/notes').catch(()=>({data:[]})), api('/events').catch(()=>({data:[]}))]);
      renderStats(s.data); renderTasks(t.data.slice(0,5)); renderNotes(n.data.slice(0,4)); renderEvents(e.data.slice(0,4)); renderChart(t.data.length, n.data.length);
    } catch { renderStats({tasks:0,notes:0,events:0,knowledge:0}); renderTasks([]); renderNotes([]); renderEvents([]); }
  }
  function renderStats(s) {
    const cs=[['Total tasks',s.tasks||0,'var(--blue-l)','rgba(77,124,254,.1)','var(--blue)','✓'],['Notes',s.notes||0,'var(--teal-l)','rgba(48,176,160,.1)','var(--teal)','◻'],['Events',s.events||0,'var(--sage)','rgba(125,181,138,.1)','var(--sage)','◷'],['Knowledge',s.knowledge||0,'var(--lav)','rgba(155,135,245,.1)','var(--lav)','◉']];
    document.getElementById('stats').innerHTML=cs.map(([l,v,c,bg,gr,ic])=>`<div class="stat-c"><div style="position:absolute;top:0;left:0;right:0;height:2px;background:${gr};"></div><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px;"><div style="width:34px;height:34px;border-radius:8px;background:${bg};display:flex;align-items:center;justify-content:center;font-size:16px;">${ic}</div><span class="badge b-teal" style="font-size:.62rem;">LIVE</span></div><div class="stat-val" style="color:${c};">${v}</div><div class="stat-lbl">${l}</div></div>`).join('');
  }
  function renderTasks(ts) {
    if(!ts.length){document.getElementById('tp').innerHTML='<div class="empty" style="padding:24px 0;"><div class="empty-ic">✓</div><h3>No tasks yet</h3><a href="tasks.html" class="btn btn-primary btn-sm" style="margin-top:10px;">+ Add task</a></div>';return;}
    document.getElementById('tp').innerHTML=ts.map(t=>`<div class="task-row"><div class="chk ${t.status==='done'?'done':'pend'}">${t.status==='done'?'✓':''}</div><span style="font-size:.84rem;flex:1;${t.status==='done'?'text-decoration:line-through;color:var(--t3);':''}">${t.name}</span>${priBadge(t.priority)}</div>`).join('');
  }
  function renderNotes(ns) {
    if(!ns.length){document.getElementById('np').innerHTML='<div class="empty" style="padding:16px 0;"><div class="empty-ic">◻</div><h3>No notes</h3></div>';return;}
    const cols=['#4d7cfe','#30b0a0','#7db58a','#e06b6b'];
    document.getElementById('np').innerHTML=`<div class="note-g">${ns.map((n,i)=>`<div class="note-m"><style>.note-m:nth-child(${i+1})::before{background:${cols[i%4]};}</style><h4>${n.title}</h4><p>${n.content}</p><div style="font-size:.65rem;color:var(--t4);margin-top:7px;font-family:var(--mono);">${timeAgo(n.createdAt)}</div></div>`).join('')}</div>`;
  }
  function renderEvents(evs) {
    if(!evs.length){document.getElementById('ep').innerHTML='<div class="empty" style="padding:14px 0;"><div class="empty-ic">◷</div><h3>No upcoming events</h3></div>';return;}
    document.getElementById('ep').innerHTML=evs.map(ev=>{const d=new Date(ev.date);return`<div class="ev-row"><div class="ev-dt"><div class="ev-d">${d.getDate()}</div><div class="ev-m">${d.toLocaleDateString('en',{month:'short'})}</div></div><div><div style="font-size:.84rem;font-weight:600;">${ev.title}</div><div style="font-size:.72rem;color:var(--t3);font-family:var(--mono);">${ev.time||'All day'}</div></div></div>`;}).join('');
  }
  function renderChart(tasks, notes) {
    const data=[tasks*.4,notes*.6,tasks*.5,(tasks+notes)*.3,tasks*.7,notes*.8,(tasks+notes)*.5].map(v=>Math.max(v||2,2));
    const max=Math.max(...data);
    const cols=['var(--blue)','var(--teal)','var(--sage)','var(--blue)','var(--teal)','var(--lav)','var(--sage)'];
    document.getElementById('chart').innerHTML=data.map((v,i)=>`<div class="bar" style="height:${(v/max)*100}%;background:${cols[i]};opacity:.75;"></div>`).join('');
  }
  load();
}
</script>
</body></html>
